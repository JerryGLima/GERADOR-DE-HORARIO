<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Profissional - Colégio Elicéu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --primary: #640510;
            --primary-hover: #ad5a64;
            --bg-editor: #ddcccc;
            --bg-workspace: #1f252b;
            --border: #8f3b44;
            --text-main: #0f172a;
        }
        
        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg-workspace); color: var(--text-main); overflow: hidden; }

        /* EDITOR (PAINEL ESQUERDO) */
        .editor { width: 400px; background: var(--bg-editor); border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; height: 100vh; box-sizing: border-box; z-index: 10; }
        .editor h2 { font-size: 18px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-top: 0; }

        .historico-box { background: #f8fafc; padding: 10px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); max-height: 150px; overflow-y: auto; }
        .hist-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; cursor: pointer; border: 1px solid var(--border); font-size: 13px; }
        .btn-lixeira { background: transparent; color: #ef4444; border: none; cursor: pointer; }

        .card-config { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 13px; margin-bottom: 10px; background: #fff; outline: none; }
        
        .dia-bloco { background: #fff; border-left: 5px solid var(--primary); padding: 15px; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; position: relative; }
        .materia-item { border-top: 1px dashed #ccc; padding-top: 10px; margin-top: 10px; }

        /* PREVIEW (PAINEL DIREITO) */
        .previa { flex: 1; display: flex; flex-direction: column; align-items: center; overflow-y: auto; padding: 20px; }
        .barra-ferramentas { background: white; padding: 10px 25px; border-radius: 100px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; position: sticky; top: 0; z-index: 50; border: 1px solid var(--border); }

        /* FOLHA DE TAMANHO 20x14cm - CABEÇALHO COMPACTO */
        #folha-pdf { 
            width: 200mm; 
            min-height: 140mm; 
            height: auto; 
            background: #FCFFD8; 
            padding: 3mm 6mm 6mm 6mm; /* 3mm no topo como solicitado */
            border: 4px solid var(--primary); 
            box-sizing: border-box; 
            transform: scale(0.6); 
            transform-origin: top center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: block; 
            color: #000;
        }

        #wrapper-duplo { display: none; flex-direction: column; width: 210mm; background: white; min-height: 297mm; align-items: center; justify-content: flex-start; padding-top: 5mm; }
        .linha-corte { width: 100%; border-top: 1px dashed #999; margin: 5mm 0; position: relative; }
        .linha-corte:after { content: '✂ CORTE AQUI'; position: absolute; right: 10mm; top: -8px; font-size: 10px; color: #999; background: white; padding: 0 5px; }

        /* CABEÇALHO SUPER COMPACTO */
        .header-pdf { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #000; 
            padding-bottom: 2px; 
            margin-bottom: 8px; 
        }
        .logo-escola-pdf { width: 65px; height: 65px; object-fit: contain; }
        .foto-prof-pdf { width: 70px; height: 85px; border: 1.5px solid var(--primary); object-fit: cover; border-radius: 5px; background: white; }

        .header-texto { text-align: center; flex: 1; }
        .header-texto h1 { margin: 0 !important; font-size: 22px; line-height: 1.0; padding-bottom: 2px; text-transform: uppercase; }
        .header-texto p { margin: 0 !important; font-size: 12px; line-height: 1.1; padding: 1px 0; font-weight: 500; }

        .grid-pdf { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .col-pdf { background: #fff; border: 1px solid var(--primary); border-radius: 5px; min-height: 80px; }
        .topo-dia { background: #e2b9be; color: var(--primary); text-align: center; padding: 5px; font-size: 10px; font-weight: bold; }
        .materia-box { padding: 5px; border-bottom: 1px dotted #666; }
        .materia-tit { font-weight: bold; font-size: 11px; color: var(--primary); }
        .materia-cont { font-size: 10px; line-height: 1.2; }
        .materia-img { width: auto; max-width: 100%; height: 115px; object-fit: contain; margin: 5px auto; display: block; }

        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; }
            .editor { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 15px; }
            #folha-pdf { transform: scale(0.45); margin-left: 0; width: 200mm; }
            .barra-ferramentas { flex-wrap: wrap; justify-content: center; border-radius: 15px; }
        }
    </style>
</head>
<body>

<div class="editor">
    <div class="historico-box">
        <h4><i data-lucide="folder-clock"></i> Meus Horários</h4>
        <div id="lista-historico"></div>
    </div>

    <h2>✍️ Editor de Horário</h2>
    <div class="card-config">
        <label>Sua Foto:</label>
        <input type="file" accept="image/*" onchange="uploadImg('outFoto', this.id, 300)" id="f-prof">
        <label>Logo da Escola:</label>
        <input type="file" accept="image/*" onchange="uploadImg('pdfLogoEscola', this.id, 400)" id="f-logo">
        <label>Seu Nome no PDF:</label>
        <input type="text" id="inNomeProf" oninput="atualizarPrevia()">
        <label>Escola:</label>
        <input type="text" id="inEscola" value="Colégio Elicéu Monteiro Alves" oninput="atualizarPrevia()">
        <label>Série:</label>
        <select id="inSerie" onchange="atualizarPrevia()"></select>
        <label>Bimestre:</label>
        <select id="inBimestre" onchange="atualizarPrevia()"></select>
    </div>

    <button onclick="adicionarDia()" style="width:100%; background:var(--primary); color:white; padding:12px; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">+ ADICIONAR DIA</button>
    <div id="lista-dias-editor"></div>
</div>

<div class="previa">
    <div class="barra-ferramentas">
        <label style="font-size:12px; cursor:pointer; display:flex; gap:5px;"><input type="checkbox" id="checkDuplo" checked> 2 por folha</label>
        <button onclick="salvarNoBanco()" style="background:#007bff; color:white; border:none; padding:8px 15px; border-radius:20px; cursor:pointer;">💾 Salvar</button>
        <button onclick="baixarPDF()" style="background:var(--primary); color:white; border:none; padding:8px 20px; border-radius:20px; font-weight:bold; cursor:pointer;">📥 Gerar PDF</button>
    </div>

    <div id="folha-pdf">
        <div class="header-pdf">
            <img src="" id="pdfLogoEscola" class="logo-escola-pdf">
            <div class="header-texto">
                <h1 id="outEscola">COLÉGIO ELICÉU MONTEIRO ALVES</h1>
                <p><strong>HORÁRIO DE AVALIAÇÕES</strong></p>
                <p><span id="outSerie">---</span> | <span id="outBimestre">---</span></p>
                <p>Prof(a): <strong id="outProf">---</strong></p>
            </div>
            <img src="" class="foto-prof-pdf" id="outFoto">
        </div>
        <div class="grid-pdf" id="outGrid"></div>
    </div>
    <div id="wrapper-duplo"></div>
</div>

<script type="module">
    import { db, auth } from "./firebase-config.js";
    import { collection, getDocs, getDoc, addDoc, doc, deleteDoc, serverTimestamp, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let disciplinasList = [];
    let diasAtivos = 0;

    async function init() {
        const sSnap = await getDocs(collection(db, "series"));
        const bSnap = await getDocs(collection(db, "bimestres"));
        const dSnap = await getDocs(collection(db, "disciplinas"));
        
        document.getElementById('inSerie').innerHTML = '<option value="">Série</option>';
        sSnap.forEach(d => document.getElementById('inSerie').innerHTML += `<option>${d.data().nome}</option>`);
        document.getElementById('inBimestre').innerHTML = '<option value="">Bimestre</option>';
        bSnap.forEach(d => document.getElementById('inBimestre').innerHTML += `<option>${d.data().nome}</option>`);
        disciplinasList = dSnap.docs.map(d => d.data().nome);

        const nGoogle = localStorage.getItem('prof_nome');
        document.getElementById('inNomeProf').value = nGoogle;
        
        const escSnap = await getDoc(doc(db, "configuracoes", "escola"));
        if(escSnap.exists()) document.getElementById('pdfLogoEscola').src = escSnap.data().logo;
        
        carregarHistorico(auth.currentUser.email);
        lucide.createIcons();
        atualizarPrevia();
    }

    async function compress(file, target) {
        return new Promise((res) => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const c = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const s = target / (w > h ? w : h);
                    c.width = w * s; c.height = h * s;
                    const ctx = c.getContext('2d');
                    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,c.width,c.height);
                    ctx.drawImage(img, 0, 0, c.width, c.height);
                    res(c.toDataURL('image/jpeg', 0.8));
                };
            };
        });
    }

    window.uploadImg = async (id, inputId, size) => {
        const file = document.getElementById(inputId).files[0];
        if(file) { document.getElementById(id).src = await compress(file, size); atualizarPrevia(); }
    };

    window.uploadFotoMat = async (inputId, hidId) => {
        const file = document.getElementById(inputId).files[0];
        if(file) { document.getElementById(hidId).value = await compress(file, 250); atualizarPrevia(); }
    };

    function carregarHistorico(email) {
        const q = query(collection(db, "horarios_salvos"), where("professor", "==", email), orderBy("criadoEm", "desc"));
        onSnapshot(q, (snap) => {
            const cont = document.getElementById('lista-historico');
            cont.innerHTML = '';
            snap.forEach(d => {
                const item = document.createElement('div');
                item.className = 'hist-item';
                item.innerHTML = `<div onclick='window.loadSch(${JSON.stringify(d.data())})' style="flex:1"><strong>${d.data().serie}</strong></div><button class="btn-lixeira" onclick="delHist('${d.id}', event)"><i data-lucide="trash-2" style="width:14px;"></i></button>`;
                cont.appendChild(item);
            });
            lucide.createIcons();
        });
    }

    window.delHist = async (id, e) => { e.stopPropagation(); if(confirm("Excluir?")) await deleteDoc(doc(db, "horarios_salvos", id)); };

    window.loadSch = (dados) => {
        document.getElementById('lista-dias-editor').innerHTML = ''; diasAtivos = 0;
        document.getElementById('inEscola').value = dados.escola;
        document.getElementById('inSerie').value = dados.serie;
        document.getElementById('inBimestre').value = dados.bimestre;
        document.getElementById('inNomeProf').value = dados.professorNomeManual || dados.professor;
        if(dados.logoEscola) document.getElementById('pdfLogoEscola').src = dados.logoEscola;
        if(dados.fotoProf) document.getElementById('outFoto').src = dados.fotoProf;
        dados.conteudo.forEach(dia => {
            const idDia = adicionarDia();
            const bloco = document.getElementById(`bloco-${idDia}`);
            bloco.querySelector('.data-input').value = dia.data;
            dia.materias.forEach(mat => {
                const mId = addMateria(idDia);
                const div = document.getElementById(mId);
                div.querySelector('.m-sel').value = mat.nome;
                div.querySelector('.m-txt').value = mat.conteudo;
                div.querySelector('.m-img-base64').value = mat.imagem || "";
            });
        });
        atualizarPrevia();
    };

    window.adicionarDia = () => {
        if(diasAtivos >= 5) return null;
        const id = Date.now();
        const div = document.createElement('div');
        div.className = 'dia-bloco'; div.id = `bloco-${id}`;
        div.innerHTML = `<button onclick="this.parentElement.remove();diasAtivos--;atualizarPrevia();" style="position:absolute;right:5px;top:5px;border:none;color:red;cursor:pointer">X</button><label>Data:</label><input type="date" class="data-input" onchange="atualizarPrevia()"><div id="m-cont-${id}"></div><button onclick="addMateria('${id}')" style="cursor:pointer;font-size:10px;width:100%">+ Matéria</button>`;
        document.getElementById('lista-dias-editor').appendChild(div);
        diasAtivos++; return id;
    };

    window.addMateria = (diaId) => {
        const mId = "mat-" + Math.random().toString(36).substr(2, 9);
        const div = document.createElement('div'); div.id = mId; div.className="materia-item";
        div.innerHTML = `<select class="m-sel" onchange="atualizarPrevia()"><option value="">Matéria</option>${disciplinasList.map(d=>`<option>${d}</option>`).join('')}</select><textarea class="m-txt" placeholder="Conteúdo" oninput="atualizarPrevia()"></textarea><input type="file" onchange="uploadFotoMat(this.id, '${mId}-base')" id="${mId}-file"><input type="hidden" class="m-img-base64" id="${mId}-base">`;
        document.getElementById(`m-cont-${diaId}`).appendChild(div); return mId;
    };

    window.atualizarPrevia = () => {
        document.getElementById('outEscola').innerText = document.getElementById('inEscola').value.toUpperCase();
        document.getElementById('outSerie').innerText = document.getElementById('inSerie').value || "---";
        document.getElementById('outBimestre').innerText = document.getElementById('inBimestre').value || "---";
        document.getElementById('outProf').innerText = document.getElementById('inNomeProf').value;
        const grid = document.getElementById('outGrid'); grid.innerHTML = '';
        document.querySelectorAll('.dia-bloco').forEach(bl => {
            const dt = bl.querySelector('.data-input').value;
            let diaT = "DIA"; let dtB = "---";
            if(dt) { const d = new Date(dt + 'T00:00:00'); diaT = d.toLocaleDateString('pt-BR', {weekday:'long'}).split('-')[0]; dtB = d.toLocaleDateString('pt-BR'); }
            let html = `<div class="col-pdf"><div class="topo-dia">${diaT.toUpperCase()}<br>${dtB}</div>`;
            bl.querySelectorAll('.materia-item').forEach(m => {
                const n = m.querySelector('.m-sel').value;
                if(n) {
                    const img = m.querySelector('.m-img-base64').value;
                    html += `<div class="materia-box"><div class="materia-tit">${n}</div><div class="materia-cont">${m.querySelector('.m-txt').value.replace(/\n/g,'<br>')}</div>${img ? `<img src="${img}" class="materia-img">` : ''}</div>`;
                }
            });
            grid.innerHTML += html + '</div>';
        });
    };

    window.salvarNoBanco = async () => {
        const conteudo = [];
        document.querySelectorAll('.dia-bloco').forEach(bl => {
            const mats = [];
            bl.querySelectorAll('.materia-item').forEach(mi => {
                mats.push({nome: mi.querySelector('.m-sel').value, conteudo: mi.querySelector('.m-txt').value, imagem: mi.querySelector('.m-img-base64').value});
            });
            conteudo.push({data: bl.querySelector('.data-input').value, materias: mats});
        });
        await addDoc(collection(db, "horarios_salvos"), {
            professor: auth.currentUser.email, professorNomeManual: document.getElementById('inNomeProf').value,
            escola: document.getElementById('inEscola').value, serie: document.getElementById('inSerie').value, bimestre: document.getElementById('inBimestre').value,
            logoEscola: document.getElementById('pdfLogoEscola').src, fotoProf: document.getElementById('outFoto').src,
            conteudo: conteudo, criadoEm: serverTimestamp()
        });
        alert("Salvo!");
    };

    window.baixarPDF = () => {
        const isD = document.getElementById('checkDuplo').checked;
        const f = document.getElementById('folha-pdf');
        let el = f;
        if (isD) {
            const w = document.getElementById('wrapper-duplo'); w.innerHTML = ''; w.style.display = 'flex';
            const c1 = f.cloneNode(true); const c2 = f.cloneNode(true); const d = document.createElement('div'); d.className = 'linha-corte';
            [c1, c2].forEach(c => { c.style.transform = "scale(1)"; c.style.boxShadow = "none"; c.style.margin = "0 auto"; });
            w.append(c1, d, c2); el = w;
        } else { f.style.transform = "scale(1)"; f.style.boxShadow = "none"; }
        const opt = { margin: 0, filename: 'Horario.pdf', image: { type: 'jpeg', quality: 1 }, html2canvas: { scale: 3, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        setTimeout(() => {
            html2pdf().set(opt).from(el).save().then(() => {
                f.style.transform = window.innerWidth <= 900 ? "scale(0.45)" : "scale(0.6)";
                f.style.boxShadow = "0 10px 30px rgba(0,0,0,0.5)"; document.getElementById('wrapper-duplo').style.display = 'none';
            });
        }, 500);
    };

    auth.onAuthStateChanged(u => u ? init() : window.location.href="index.html");
</script>
</body>
</html>

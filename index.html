<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Horário de Avaliações</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#640510">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/640510/FFFFFF?text=CE">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #640510;
            --primary-hover: #8f2030;
            --primary-light: #f9e8ea;
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --surface: #ffffff;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-color); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            background-image: radial-gradient(circle at top right, #fce8ea 0%, transparent 50%), 
                              radial-gradient(circle at bottom left, #e0e7ff 0%, transparent 50%);
        }

        .container { 
            background: var(--surface); 
            padding: 40px 32px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 20px 60px -10px rgba(100, 5, 16, 0.12); 
            width: 100%; 
            max-width: 420px;
            border: 1px solid #f1f5f9;
        }

        .logo-box {
            width: 80px; 
            height: 80px; 
            background: var(--primary-light); 
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto 24px;
            color: var(--primary);
            box-shadow: 0 4px 12px rgba(100, 5, 16, 0.15);
        }

        h1 { 
            color: var(--text-main); 
            margin-bottom: 6px; 
            font-size: 22px; 
            font-weight: 700; 
            letter-spacing: -0.5px; 
            line-height: 1.2;
        }

        .subtitle { 
            color: var(--text-muted); 
            margin-bottom: 32px; 
            font-size: 14px; 
            line-height: 1.5;
        }

        .btn-acesso { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            width: 100%; 
            padding: 15px 20px; 
            margin-bottom: 12px; 
            border: 1.5px solid var(--border); 
            border-radius: 12px; 
            background: white; 
            color: var(--text-main); 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s ease;
            font-family: inherit;
            min-height: 52px; /* tamanho adequado para touch */
        }

        .btn-acesso:hover, .btn-acesso:focus { 
            background: #f8fafc; 
            border-color: var(--primary);
            outline: none;
        }
        .btn-acesso:active { transform: scale(0.98); }

        .btn-acesso.primary { 
            background: var(--primary); 
            color: white; 
            border-color: var(--primary); 
        }

        .btn-acesso.primary:hover { 
            background: var(--primary-hover); 
            border-color: var(--primary-hover);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            color: var(--text-muted);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .btn-admin { 
            font-size: 14px; 
            border: 1.5px solid var(--border); 
            color: var(--text-muted); 
            margin-top: 0;
            background: transparent; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            width: 100%; 
            transition: all 0.2s; 
            padding: 12px;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 500;
            min-height: 48px;
        }
        .btn-admin:hover, .btn-admin:focus { 
            color: var(--primary); 
            border-color: var(--primary);
            background: var(--primary-light);
            outline: none;
        }
        .btn-admin:active { transform: scale(0.98); }

        .loader { 
            display: none; 
            margin-top: 20px; 
            color: var(--primary); 
            font-weight: 500; 
            font-size: 14px; 
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: var(--primary-light);
            border-radius: 10px;
        }

        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .footer-text {
            margin-top: 32px; 
            font-size: 12px; 
            color: var(--text-muted);
            text-align: center;
        }

        @media (max-width: 480px) {
            .container { padding: 32px 20px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-box">
        <i data-lucide="graduation-cap" style="width: 44px; height: 44px;"></i>
    </div>
    
    <h1>GERADOR DE HORÁRIO DE AVALIAÇÕES</h1>
    <p class="subtitle">Acesse com sua conta Google para continuar</p>

    <button class="btn-acesso primary" onclick="fazerLogin('professor')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Entrar com Google
    </button>

    <div class="divider">ou</div>

    <button class="btn-admin" onclick="fazerLogin('admin')">
        <i data-lucide="shield-check" style="width: 16px; height: 16px;"></i>
        Acesso Administrativo
    </button>

    <div id="status" class="loader">
        <i data-lucide="loader-2" class="spin" style="width: 16px; height: 16px;"></i>
        Verificando credenciais...
    </div>
</div>

<p class="footer-text">&copy; 2026 — Jerry Gleydison. Todos os direitos reservados.</p>

<script>
    lucide.createIcons();
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Ativo"));
    }
</script>

<script type="module">
    import { auth, provider, db } from "./firebase-config.js";
    import { signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    window.fazerLogin = async (tipoDesejado) => {
        const status = document.getElementById('status');
        status.style.display = 'flex';
        
        try {
            const result = await signInWithPopup(auth, provider);
            const user = result.user;
            const emailLogado = user.email.toLowerCase().trim();

            if (tipoDesejado === 'admin') {
                const q = query(collection(db, "admin"), where("email", "==", emailLogado));
                const snap = await getDocs(q);

                if (!snap.empty) {
                    window.location.href = "admin.html";
                } else {
                    status.style.display = 'none';
                    alert("Acesso Negado: " + emailLogado + "\nSeu e-mail não está cadastrado como administrador.");
                    await signOut(auth);
                }
            } else {
                localStorage.setItem('prof_email', emailLogado);
                localStorage.setItem('prof_nome', user.displayName || '');
                localStorage.setItem('prof_foto', user.photoURL || '');
                window.location.href = "gerar.html";
            }
        } catch (error) {
            console.error(error);
            status.style.display = 'none';
            if (error.code !== 'auth/popup-closed-by-user') {
                alert("Erro ao realizar login. Tente novamente.");
            }
        }
    };
</script>
</body>
</html>
